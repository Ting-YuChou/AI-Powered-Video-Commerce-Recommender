name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Code.Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: Code.Frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file
        run: docker compose config -q
      - name: Build backend production image
        run: docker build --target production -t video-commerce-backend:ci .
      - name: Build frontend edge image
        run: docker build -f Code.Frontend/Dockerfile -t video-commerce-edge:ci .

  docker-backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pull Docker test dependencies
        run: |
          for attempt in 1 2 3; do
            if docker compose --profile test pull \
              redis redis-cache postgres zookeeper kafka kafka-init; then
              exit 0
            fi
            if [ "$attempt" = "3" ]; then
              exit 1
            fi
            sleep $((attempt * 10))
          done
      - name: Run backend tests inside Docker
        run: docker compose --profile test run --rm backend-tests

  docker-integration:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run compose integration smoke tests
        run: docker compose --profile test up --build --abort-on-container-exit --exit-code-from integration-tests integration-tests
