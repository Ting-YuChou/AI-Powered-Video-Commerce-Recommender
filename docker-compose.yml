version: '3.8'

x-common-service: &common-service
  build:
    context: .
    dockerfile: Dockerfile
    target: production
    args:
      - PYTHON_VERSION=3.10
      - BUILD_ENV=production
  environment: &common-env
    ENVIRONMENT: production
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_DB: 0
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_ENABLE: "true"
    MODEL_CACHE_DIR: /app/models
    DATA_UPLOAD_DIR: /app/uploads
    DATA_LOAD_SAMPLE_DATA: "false"
    MODEL_LAZY_LOAD: "true"
    MONITORING_LOG_LEVEL: INFO
    MONITORING_ENABLE_METRICS: "true"
    MONITORING_ENABLE_PROFILING_LOGS: ${MONITORING_ENABLE_PROFILING_LOGS:-false}
    MONITORING_PROFILING_LOG_MIN_DURATION_MS: ${MONITORING_PROFILING_LOG_MIN_DURATION_MS:-250}
    MODEL_TORCH_NUM_THREADS: ${MODEL_TORCH_NUM_THREADS:-0}
    MODEL_TORCH_NUM_INTEROP_THREADS: ${MODEL_TORCH_NUM_INTEROP_THREADS:-1}
    RANKING_ENABLE_ASYNC_BATCHING: ${RANKING_ENABLE_ASYNC_BATCHING:-true}
    RANKING_BATCH_MAX_REQUESTS: ${RANKING_BATCH_MAX_REQUESTS:-8}
    RANKING_BATCH_WAIT_MS: ${RANKING_BATCH_WAIT_MS:-5}
    RANKING_BATCH_QUEUE_SIZE: ${RANKING_BATCH_QUEUE_SIZE:-2048}
    SERVICE_RECOMMENDATION_SERVICE_URL: http://recommendation-service:8001
    SERVICE_INTERACTION_INGEST_SERVICE_URL: http://interaction-ingest-service:8002
    SERVICE_PROXY_MAX_CONNECTIONS: ${SERVICE_PROXY_MAX_CONNECTIONS:-500}
    SERVICE_PROXY_MAX_KEEPALIVE_CONNECTIONS: ${SERVICE_PROXY_MAX_KEEPALIVE_CONNECTIONS:-100}
    SERVICE_PROXY_KEEPALIVE_EXPIRY_SECONDS: ${SERVICE_PROXY_KEEPALIVE_EXPIRY_SECONDS:-5}
    SERVICE_PROXY_CONNECT_TIMEOUT_SECONDS: ${SERVICE_PROXY_CONNECT_TIMEOUT_SECONDS:-5}
    SERVICE_PROXY_READ_TIMEOUT_SECONDS: ${SERVICE_PROXY_READ_TIMEOUT_SECONDS:-10}
    SERVICE_PROXY_WRITE_TIMEOUT_SECONDS: ${SERVICE_PROXY_WRITE_TIMEOUT_SECONDS:-10}
    SERVICE_PROXY_POOL_TIMEOUT_SECONDS: ${SERVICE_PROXY_POOL_TIMEOUT_SECONDS:-15}
  volumes:
    - models_data:/app/models
    - upload_data:/app/uploads
    - logs_data:/app/logs
  networks:
    - video-commerce-network
  restart: unless-stopped

services:
  gateway-api:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn gateway_api:app --host 0.0.0.0 --port 8000 --workers ${SERVICE_GATEWAY_WORKERS:-2}
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      API_PORT: 8000
      API_RATE_LIMIT_REQUESTS: ${API_RATE_LIMIT_REQUESTS:-1000000}
      SERVICE_GATEWAY_PORT: 8000
      SERVICE_GATEWAY_WORKERS: ${SERVICE_GATEWAY_WORKERS:-2}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      recommendation-service:
        condition: service_started
      interaction-ingest-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  recommendation-service:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn recommendation_api:app --host 0.0.0.0 --port 8001 --workers ${SERVICE_RECOMMENDATION_WORKERS:-2}
    environment:
      <<: *common-env
      API_PORT: 8001
      SERVICE_RECOMMENDATION_PORT: 8001
      SERVICE_RECOMMENDATION_WORKERS: ${SERVICE_RECOMMENDATION_WORKERS:-2}
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'

  interaction-ingest-service:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn interaction_ingest_api:app --host 0.0.0.0 --port 8002 --workers ${SERVICE_INTERACTION_WORKERS:-2}
    environment:
      <<: *common-env
      API_PORT: 8002
      SERVICE_INTERACTION_PORT: 8002
      SERVICE_INTERACTION_WORKERS: ${SERVICE_INTERACTION_WORKERS:-2}
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  content-worker:
    <<: *common-service
    command: python -m kafka_workers.video_processor
    environment:
      <<: *common-env
      MODEL_LAZY_LOAD: "false"
      WORKER_TYPE: content_processor
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  feature-worker:
    <<: *common-service
    command: python -m kafka_workers.feature_updater
    environment:
      <<: *common-env
      WORKER_TYPE: feature_updater
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'

  model-trainer:
    <<: *common-service
    command: python -m model_trainer
    environment:
      <<: *common-env
      SERVICE_TRAINER_INTERVAL_SECONDS: ${SERVICE_TRAINER_INTERVAL_SECONDS:-3600}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - sh
      - -ec
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-interactions --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic video-processing-tasks --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic recommendation-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic feature-updates --partitions 3 --replication-factor 1
    networks:
      - video-commerce-network
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - prometheus_data:/prometheus
    networks:
      - video-commerce-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - video-commerce-network
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  models_data:
  upload_data:
  logs_data:
  redis_data:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  video-commerce-network:
    driver: bridge
