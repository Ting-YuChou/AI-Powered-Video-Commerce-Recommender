x-common-service: &common-service
  build:
    context: .
    dockerfile: Dockerfile
    target: production
    args:
      PYTHON_VERSION: "3.10"
      BUILD_ENV: production
  environment: &common-env
    ENVIRONMENT: ${ENVIRONMENT:-production}
    API_API_KEY: ${API_API_KEY:-}
    API_API_KEY_FILE: ${API_API_KEY_FILE:-}
    API_CORS_ORIGINS: ${API_CORS_ORIGINS:-https://localhost,http://localhost,https://127.0.0.1,http://127.0.0.1}
    API_CORS_CREDENTIALS: "false"
    REDIS_HOST: redis
    REDIS_PORT: 6379
    REDIS_DB: 0
    REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    REDIS_PASSWORD_FILE: ${REDIS_PASSWORD_FILE:-}
    REDIS_MAX_CONNECTIONS: ${REDIS_MAX_CONNECTIONS:-1000}
    REDIS_CACHE_HOST: ${REDIS_CACHE_HOST:-redis-cache}
    REDIS_CACHE_PORT: ${REDIS_CACHE_PORT:-6379}
    REDIS_CACHE_DB: ${REDIS_CACHE_DB:-0}
    REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD:-${REDIS_PASSWORD:-}}
    REDIS_CACHE_PASSWORD_FILE: ${REDIS_CACHE_PASSWORD_FILE:-}
    REDIS_CACHE_MAX_CONNECTIONS: ${REDIS_CACHE_MAX_CONNECTIONS:-1000}
    REDIS_CACHE_SOCKET_TIMEOUT: ${REDIS_CACHE_SOCKET_TIMEOUT:-1}
    REDIS_CACHE_SOCKET_CONNECT_TIMEOUT: ${REDIS_CACHE_SOCKET_CONNECT_TIMEOUT:-1}
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KAFKA_ENABLE: "true"
    KAFKA_CONSUMER_ENABLE_AUTO_COMMIT: ${KAFKA_CONSUMER_ENABLE_AUTO_COMMIT:-false}
    KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS: ${KAFKA_CONSUMER_MAX_POLL_INTERVAL_MS:-600000}
    KAFKA_CONSUMER_HANDLER_RETRIES: ${KAFKA_CONSUMER_HANDLER_RETRIES:-3}
    KAFKA_CONSUMER_HANDLER_RETRY_BACKOFF_MS: ${KAFKA_CONSUMER_HANDLER_RETRY_BACKOFF_MS:-250}
    KAFKA_DEAD_LETTER_ENABLE: ${KAFKA_DEAD_LETTER_ENABLE:-true}
    KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-dead-letter-events}
    FEATURE_PIPELINE_MODE: ${FEATURE_PIPELINE_MODE:-flink}
    FLINK_FEATURE_OUTPUT_NAMESPACE: ${FLINK_FEATURE_OUTPUT_NAMESPACE:-official}
    FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-file:///flink/checkpoints/runtime}
    FLINK_WATERMARK_OUT_OF_ORDERNESS_SECONDS: ${FLINK_WATERMARK_OUT_OF_ORDERNESS_SECONDS:-300}
    FLINK_ALLOWED_LATENESS_SECONDS: ${FLINK_ALLOWED_LATENESS_SECONDS:-600}
    FLINK_KAFKA_TRANSACTION_TIMEOUT_MS: ${FLINK_KAFKA_TRANSACTION_TIMEOUT_MS:-600000}
    DATABASE_ENABLE: "true"
    DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://video_commerce:${POSTGRES_PASSWORD:-video_commerce}@postgres:5432/video_commerce}
    DATABASE_URL_FILE: ${DATABASE_URL_FILE:-}
    DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-5}
    DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-5}
    DATABASE_ANALYTICS_SUMMARY_CACHE_TTL_SECONDS: ${DATABASE_ANALYTICS_SUMMARY_CACHE_TTL_SECONDS:-15}
    DATABASE_TRAINING_SEQUENCE_LOOKBACK_DAYS: ${DATABASE_TRAINING_SEQUENCE_LOOKBACK_DAYS:-90}
    DATABASE_AUTO_CREATE_SCHEMA: "true"
    MODEL_CACHE_DIR: /app/models
    VECTOR_INDEX_PATH: /app/models/vector_index.faiss
    RECOMMENDATION_CF_INDEX_PATH: /app/models/cf_vector_index.faiss
    RECOMMENDATION_USER_EMBEDDING_CACHE_SIZE: ${RECOMMENDATION_USER_EMBEDDING_CACHE_SIZE:-20000}
    RECOMMENDATION_USER_EMBEDDING_CACHE_TIME_BUCKET_SECONDS: ${RECOMMENDATION_USER_EMBEDDING_CACHE_TIME_BUCKET_SECONDS:-1}
    RECOMMENDATION_KNOWN_USER_SNAPSHOT_ENABLED: ${RECOMMENDATION_KNOWN_USER_SNAPSHOT_ENABLED:-true}
    RECOMMENDATION_KNOWN_USER_SNAPSHOT_REFRESH_INTERVAL_SECONDS: ${RECOMMENDATION_KNOWN_USER_SNAPSHOT_REFRESH_INTERVAL_SECONDS:-60}
    RECOMMENDATION_KNOWN_USER_SNAPSHOT_MAX_USERS: ${RECOMMENDATION_KNOWN_USER_SNAPSHOT_MAX_USERS:-200000}
    RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_ENABLED: ${RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_ENABLED:-true}
    RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_REFRESH_INTERVAL_SECONDS: ${RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_REFRESH_INTERVAL_SECONDS:-60}
    RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_MAX_ITEMS: ${RECOMMENDATION_CONTENT_FEATURES_SNAPSHOT_MAX_ITEMS:-100000}
    RECOMMENDATION_RETRIEVAL_EXECUTOR_WORKERS: ${RECOMMENDATION_RETRIEVAL_EXECUTOR_WORKERS:-2}
    RECOMMENDATION_SERVING_RECENT_INTERACTION_LIMIT: ${RECOMMENDATION_SERVING_RECENT_INTERACTION_LIMIT:-0}
    RECOMMENDATION_SPEECH_CATEGORY_CANDIDATES_ENABLED: ${RECOMMENDATION_SPEECH_CATEGORY_CANDIDATES_ENABLED:-false}
    DATA_UPLOAD_DIR: /app/uploads
    DATA_LOAD_SAMPLE_DATA: "false"
    DATA_MAX_FILE_SIZE: ${DATA_MAX_FILE_SIZE:-104857600}
    MODEL_LAZY_LOAD: "true"
    MODEL_TORCH_NUM_THREADS: ${MODEL_TORCH_NUM_THREADS:-1}
    MODEL_TORCH_NUM_INTEROP_THREADS: ${MODEL_TORCH_NUM_INTEROP_THREADS:-1}
    MODEL_SPEECH_TO_TEXT_ENABLED: ${MODEL_SPEECH_TO_TEXT_ENABLED:-false}
    MODEL_SPEECH_TO_TEXT_BASE_URL: ${MODEL_SPEECH_TO_TEXT_BASE_URL:-http://asr-service:8010}
    MODEL_SPEECH_TO_TEXT_MODEL: ${MODEL_SPEECH_TO_TEXT_MODEL:-Qwen/Qwen3-ASR-0.6B}
    MODEL_SPEECH_TO_TEXT_TIMEOUT_SECONDS: ${MODEL_SPEECH_TO_TEXT_TIMEOUT_SECONDS:-120}
    MODEL_SPEECH_TO_TEXT_MAX_ATTEMPTS: ${MODEL_SPEECH_TO_TEXT_MAX_ATTEMPTS:-2}
    MODEL_SPEECH_TO_TEXT_MAX_TRANSCRIPT_CHARS: ${MODEL_SPEECH_TO_TEXT_MAX_TRANSCRIPT_CHARS:-4000}
    RANKING_BATCH_MAX_REQUESTS: ${RANKING_BATCH_MAX_REQUESTS:-64}
    RANKING_BATCH_TARGET_REQUESTS: ${RANKING_BATCH_TARGET_REQUESTS:-32}
    RANKING_BATCH_WAIT_MS: ${RANKING_BATCH_WAIT_MS:-48}
    RANKING_BATCH_QUEUE_SIZE: ${RANKING_BATCH_QUEUE_SIZE:-32768}
    RANKING_BATCH_RUNNER_COUNT: ${RANKING_BATCH_RUNNER_COUNT:-16}
    RANKING_COORDINATOR_DISPATCH_CONCURRENCY: ${RANKING_COORDINATOR_DISPATCH_CONCURRENCY:-16}
    RANKING_RUNNER_QUEUE_SIZE: ${RANKING_RUNNER_QUEUE_SIZE:-0}
    RANKING_RUNNER_BATCH_CONCURRENCY: ${RANKING_RUNNER_BATCH_CONCURRENCY:-1}
    RANKING_INFERENCE_EXECUTOR_WORKERS: ${RANKING_INFERENCE_EXECUTOR_WORKERS:-16}
    RANKING_INFERENCE_PROCESS_WORKERS: ${RANKING_INFERENCE_PROCESS_WORKERS:-0}
    RANKING_MAX_QUEUE_WAIT_MS: ${RANKING_MAX_QUEUE_WAIT_MS:-150}
    RANKING_PRODUCT_FEATURE_CACHE_SIZE: ${RANKING_PRODUCT_FEATURE_CACHE_SIZE:-50000}
    RANKING_REALTIME_WINDOW_FEATURES_ENABLED: ${RANKING_REALTIME_WINDOW_FEATURES_ENABLED:-false}
    RANKING_RUNNER_PAYLOAD_V2_ENABLED: ${RANKING_RUNNER_PAYLOAD_V2_ENABLED:-true}
    RANKING_RUNNER_PAYLOAD_MAX_BYTES: ${RANKING_RUNNER_PAYLOAD_MAX_BYTES:-33554432}
    RANKING_TORCH_COMPILE_ENABLED: ${RANKING_TORCH_COMPILE_ENABLED:-false}
    RANKING_TORCH_COMPILE_BACKEND: ${RANKING_TORCH_COMPILE_BACKEND:-inductor}
    RANKING_TORCH_COMPILE_MODE: ${RANKING_TORCH_COMPILE_MODE:-default}
    RANKING_TORCH_COMPILE_DYNAMIC: ${RANKING_TORCH_COMPILE_DYNAMIC:-true}
    CACHE_CANDIDATE_CACHE_RACE_TIMEOUT_MS: ${CACHE_CANDIDATE_CACHE_RACE_TIMEOUT_MS:-5}
    CACHE_RECOMMENDATION_CACHE_RACE_TIMEOUT_MS: ${CACHE_RECOMMENDATION_CACHE_RACE_TIMEOUT_MS:-5}
    CACHE_BACKGROUND_TASK_QUEUE_SIZE: ${CACHE_BACKGROUND_TASK_QUEUE_SIZE:-8192}
    CACHE_BACKGROUND_TASK_WORKER_COUNT: ${CACHE_BACKGROUND_TASK_WORKER_COUNT:-4}
    API_RATE_LIMIT_REQUESTS: ${API_RATE_LIMIT_REQUESTS:-120000}
    MONITORING_LOG_LEVEL: INFO
    MONITORING_ENABLE_METRICS: "true"
    MONITORING_ENABLE_PROMETHEUS_METRICS: "true"
    MONITORING_ENABLE_REQUEST_LOGGING: ${MONITORING_ENABLE_REQUEST_LOGGING:-true}
    MONITORING_REQUEST_LOG_SAMPLE_RATE: ${MONITORING_REQUEST_LOG_SAMPLE_RATE:-0.01}
    MONITORING_ERROR_REQUEST_LOG_SAMPLE_RATE: ${MONITORING_ERROR_REQUEST_LOG_SAMPLE_RATE:-0.01}
    MONITORING_ENABLE_PROFILING_LOGS: ${MONITORING_ENABLE_PROFILING_LOGS:-false}
    MONITORING_PROFILING_LOG_MIN_DURATION_MS: ${MONITORING_PROFILING_LOG_MIN_DURATION_MS:-250}
    MONITORING_WORKER_HEARTBEAT_INTERVAL_SECONDS: "15"
    MONITORING_WORKER_HEARTBEAT_TTL_SECONDS: "45"
    MONITORING_ENABLE_TRACING: ${MONITORING_ENABLE_TRACING:-true}
    MONITORING_TRACING_SAMPLE_RATE: ${MONITORING_TRACING_SAMPLE_RATE:-0.01}
    MONITORING_WORKER_METRICS_HOST: 0.0.0.0
    OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
    OTEL_EXPORTER_OTLP_INSECURE: "true"
    OTEL_TRACES_SAMPLER: parentbased_traceidratio
    OTEL_TRACES_SAMPLER_ARG: ${MONITORING_TRACING_SAMPLE_RATE:-0.01}
    SERVICE_RECOMMENDATION_SERVICE_URL: http://recommendation-service:8001
    SERVICE_RECOMMENDATION_SERVICE_URLS: ${SERVICE_RECOMMENDATION_SERVICE_URLS:-http://recommendation-service:8001}
    SERVICE_RANKING_SERVICE_URL: http://ranking-service:8003
    SERVICE_RANKING_SERVICE_URLS: ${SERVICE_RANKING_SERVICE_URLS:-http://ranking-service:8003}
    SERVICE_RANKING_COORDINATOR_HOST: ${SERVICE_RANKING_COORDINATOR_HOST:-ranking-coordinator}
    SERVICE_RANKING_COORDINATOR_BIND_HOST: ${SERVICE_RANKING_COORDINATOR_BIND_HOST:-0.0.0.0}
    SERVICE_RANKING_COORDINATOR_PORT: ${SERVICE_RANKING_COORDINATOR_PORT:-8013}
    SERVICE_RANKING_COORDINATOR_BACKLOG: ${SERVICE_RANKING_COORDINATOR_BACKLOG:-4096}
    SERVICE_RANKING_COORDINATOR_CLIENT_POOL_SIZE: ${SERVICE_RANKING_COORDINATOR_CLIENT_POOL_SIZE:-128}
    SERVICE_RANKING_COORDINATOR_DIRECT_ENABLED: ${SERVICE_RANKING_COORDINATOR_DIRECT_ENABLED:-true}
    SERVICE_RANKING_COORDINATOR_CONNECT_TIMEOUT_SECONDS: ${SERVICE_RANKING_COORDINATOR_CONNECT_TIMEOUT_SECONDS:-1}
    SERVICE_RANKING_COORDINATOR_REQUEST_TIMEOUT_SECONDS: ${SERVICE_RANKING_COORDINATOR_REQUEST_TIMEOUT_SECONDS:-2}
    SERVICE_RANKING_RUNNER_URLS: ${SERVICE_RANKING_RUNNER_URLS:-ranking-runner:8014}
    SERVICE_RANKING_RUNNER_BIND_HOST: ${SERVICE_RANKING_RUNNER_BIND_HOST:-0.0.0.0}
    SERVICE_RANKING_RUNNER_PORT: ${SERVICE_RANKING_RUNNER_PORT:-8014}
    SERVICE_RANKING_RUNNER_BACKLOG: ${SERVICE_RANKING_RUNNER_BACKLOG:-4096}
    SERVICE_RANKING_RUNNER_STREAM_LIMIT: ${SERVICE_RANKING_RUNNER_STREAM_LIMIT:-33554432}
    SERVICE_RANKING_RUNNER_CONNECT_TIMEOUT_SECONDS: ${SERVICE_RANKING_RUNNER_CONNECT_TIMEOUT_SECONDS:-1}
    SERVICE_RANKING_RUNNER_REQUEST_TIMEOUT_SECONDS: ${SERVICE_RANKING_RUNNER_REQUEST_TIMEOUT_SECONDS:-1.5}
    SERVICE_RANKING_RUNNER_UNHEALTHY_COOLDOWN_SECONDS: ${SERVICE_RANKING_RUNNER_UNHEALTHY_COOLDOWN_SECONDS:-0.2}
    SERVICE_RANKING_RUNNER_DNS_REFRESH_SECONDS: ${SERVICE_RANKING_RUNNER_DNS_REFRESH_SECONDS:-5}
    SERVICE_RANKING_RUNNER_ENDPOINT_MISSING_REFRESHES: ${SERVICE_RANKING_RUNNER_ENDPOINT_MISSING_REFRESHES:-3}
    SERVICE_RANKING_RUNNER_ENDPOINT_MISSING_GRACE_SECONDS: ${SERVICE_RANKING_RUNNER_ENDPOINT_MISSING_GRACE_SECONDS:-30}
    SERVICE_INTERACTION_INGEST_SERVICE_URL: http://interaction-ingest-service:8002
    SERVICE_MAX_INFLIGHT_RECOMMENDATIONS: ${SERVICE_MAX_INFLIGHT_RECOMMENDATIONS:-40}
    SERVICE_RANKING_SERVICE_FALLBACK_ENABLED: ${SERVICE_RANKING_SERVICE_FALLBACK_ENABLED:-false}
    SERVICE_RANKING_SINGLE_COORDINATOR_ENABLED: ${SERVICE_RANKING_SINGLE_COORDINATOR_ENABLED:-true}
    SERVICE_PROXY_POOL_TIMEOUT_SECONDS: ${SERVICE_PROXY_POOL_TIMEOUT_SECONDS:-5}
    SERVICE_PROXY_MAX_CONNECTIONS: ${SERVICE_PROXY_MAX_CONNECTIONS:-2000}
    SERVICE_PROXY_MAX_KEEPALIVE_CONNECTIONS: ${SERVICE_PROXY_MAX_KEEPALIVE_CONNECTIONS:-1000}
    SERVICE_PROXY_KEEPALIVE_EXPIRY_SECONDS: ${SERVICE_PROXY_KEEPALIVE_EXPIRY_SECONDS:-30}
    SECURITY_AUTH_MODE: ${SECURITY_AUTH_MODE:-api_key}
    SECURITY_INTERNAL_SERVICE_KEY: ${SECURITY_INTERNAL_SERVICE_KEY:-}
    SECURITY_INTERNAL_SERVICE_KEY_FILE: ${SECURITY_INTERNAL_SERVICE_KEY_FILE:-}
    SECURITY_INTERNAL_SERVICE_HEADER: X-Internal-Service-Key
    SECURITY_OIDC_ENABLED: ${SECURITY_OIDC_ENABLED:-false}
    SECURITY_OIDC_REQUIRED: ${SECURITY_OIDC_REQUIRED:-false}
    SECURITY_OIDC_ISSUER: ${SECURITY_OIDC_ISSUER:-}
    SECURITY_OIDC_AUDIENCE: ${SECURITY_OIDC_AUDIENCE:-}
    SECURITY_OIDC_JWKS_URL: ${SECURITY_OIDC_JWKS_URL:-}
    SECURITY_JWT_SHARED_SECRET: ${SECURITY_JWT_SHARED_SECRET:-}
    SECURITY_JWT_SHARED_SECRET_FILE: ${SECURITY_JWT_SHARED_SECRET_FILE:-}
    SECURITY_JWT_ALGORITHMS: ${SECURITY_JWT_ALGORITHMS:-RS256}
    OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-local}
    OBJECT_STORAGE_ENDPOINT_URL: ${OBJECT_STORAGE_ENDPOINT_URL:-http://minio:9000}
    OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-us-east-1}
    OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-video-commerce-assets}
    OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
    OBJECT_STORAGE_ACCESS_KEY_ID_FILE: ${OBJECT_STORAGE_ACCESS_KEY_ID_FILE:-}
    OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
    OBJECT_STORAGE_SECRET_ACCESS_KEY_FILE: ${OBJECT_STORAGE_SECRET_ACCESS_KEY_FILE:-}
    OBJECT_STORAGE_PREFIX: ${OBJECT_STORAGE_PREFIX:-uploads}
    OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-true}
    OBJECT_STORAGE_CREATE_BUCKET_ON_STARTUP: ${OBJECT_STORAGE_CREATE_BUCKET_ON_STARTUP:-false}
    OBJECT_STORAGE_CONNECT_TIMEOUT_SECONDS: ${OBJECT_STORAGE_CONNECT_TIMEOUT_SECONDS:-5}
    OBJECT_STORAGE_READ_TIMEOUT_SECONDS: ${OBJECT_STORAGE_READ_TIMEOUT_SECONDS:-60}
    OBJECT_STORAGE_MAX_ATTEMPTS: ${OBJECT_STORAGE_MAX_ATTEMPTS:-3}
    OBJECT_STORAGE_CHECKSUM_ALGORITHM: ${OBJECT_STORAGE_CHECKSUM_ALGORITHM:-}
    OBJECT_STORAGE_SERVER_SIDE_ENCRYPTION: ${OBJECT_STORAGE_SERVER_SIDE_ENCRYPTION:-}
  volumes:
    - models_data:/app/models
    - upload_data:/app/uploads
    - logs_data:/app/logs
  networks:
    - video-commerce-network
  restart: unless-stopped

services:
  caddy:
    build:
      context: .
      dockerfile: Code.Frontend/Dockerfile
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    depends_on:
      gateway-api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - video-commerce-network
    restart: unless-stopped

  gateway-api:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn video_commerce.services.gateway.api:app --host 0.0.0.0 --port 8000 --workers ${SERVICE_GATEWAY_WORKERS:-4} --no-access-log
    environment:
      <<: *common-env
      API_PORT: 8000
      SERVICE_GATEWAY_PORT: 8000
      SERVICE_GATEWAY_WORKERS: ${SERVICE_GATEWAY_WORKERS:-4}
    expose:
      - "8000"
    depends_on:
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      recommendation-service:
        condition: service_healthy
      interaction-ingest-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: ${SERVICE_GATEWAY_REPLICAS:-1}

  recommendation-service:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn video_commerce.services.recommendation.api:app --host 0.0.0.0 --port 8001 --workers ${SERVICE_RECOMMENDATION_WORKERS:-8} --no-access-log
    environment:
      <<: *common-env
      API_PORT: 8001
      SERVICE_RECOMMENDATION_PORT: 8001
      SERVICE_RECOMMENDATION_WORKERS: ${SERVICE_RECOMMENDATION_WORKERS:-8}
    expose:
      - "8001"
    depends_on:
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ranking-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: ${SERVICE_RECOMMENDATION_REPLICAS:-1}

  ranking-runner:
    <<: *common-service
    command: python -m video_commerce.services.ranking_runner.main
    environment:
      <<: *common-env
      API_PORT: ${SERVICE_RANKING_RUNNER_PORT:-8014}
      SERVICE_RANKING_RUNNER_BIND_HOST: ${SERVICE_RANKING_RUNNER_BIND_HOST:-0.0.0.0}
      SERVICE_RANKING_RUNNER_PORT: ${SERVICE_RANKING_RUNNER_PORT:-8014}
    expose:
      - "8014"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,socket; s=socket.create_connection(('localhost', int(os.getenv('SERVICE_RANKING_RUNNER_PORT','8014'))), 2); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    deploy:
      replicas: ${RANKING_RUNNER_REPLICAS:-16}

  ranking-coordinator:
    <<: *common-service
    command: python -m video_commerce.services.ranking_coordinator.main
    environment:
      <<: *common-env
      API_PORT: ${SERVICE_RANKING_COORDINATOR_PORT:-8013}
      SERVICE_RANKING_COORDINATOR_HOST: ""
      SERVICE_RANKING_COORDINATOR_BIND_HOST: ${SERVICE_RANKING_COORDINATOR_BIND_HOST:-0.0.0.0}
      SERVICE_RANKING_COORDINATOR_PORT: ${SERVICE_RANKING_COORDINATOR_PORT:-8013}
    expose:
      - "8013"
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      ranking-runner:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,socket; s=socket.create_connection(('localhost', int(os.getenv('SERVICE_RANKING_COORDINATOR_PORT','8013'))), 2); s.close()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1

  ranking-service:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn video_commerce.services.ranking_service.proxy_asgi:app --host 0.0.0.0 --port 8003 --workers ${SERVICE_RANKING_WORKERS:-4} --no-access-log
    environment:
      <<: *common-env
      API_PORT: 8003
      SERVICE_RANKING_PORT: 8003
      SERVICE_RANKING_WORKERS: ${SERVICE_RANKING_WORKERS:-4}
    expose:
      - "8003"
    depends_on:
      ranking-coordinator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: ${RANKING_SERVICE_REPLICAS:-1}

  interaction-ingest-service:
    <<: *common-service
    command:
      - sh
      - -lc
      - python -m uvicorn video_commerce.services.interaction_ingest.api:app --host 0.0.0.0 --port 8002 --workers ${SERVICE_INTERACTION_WORKERS:-2} --no-access-log
    environment:
      <<: *common-env
      API_PORT: 8002
      SERVICE_INTERACTION_PORT: 8002
      SERVICE_INTERACTION_WORKERS: ${SERVICE_INTERACTION_WORKERS:-2}
    expose:
      - "8002"
    depends_on:
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/readyz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  content-worker:
    <<: *common-service
    command: python -m video_commerce.services.content_worker.video_processor
    environment:
      <<: *common-env
      MODEL_LAZY_LOAD: "false"
      WORKER_TYPE: content_processor
      MONITORING_WORKER_METRICS_PORT: 9101
    expose:
      - "9101"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  asr-service:
    profiles: ["speech-gpu"]
    build:
      context: .
      dockerfile: Dockerfile.asr
    environment:
      HF_HOME: /models/huggingface
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      ASR_MODEL: ${MODEL_SPEECH_TO_TEXT_MODEL:-Qwen/Qwen3-ASR-0.6B}
      ASR_DEVICE: ${ASR_DEVICE:-cuda:0}
      ASR_MAX_AUDIO_BYTES: ${ASR_MAX_AUDIO_BYTES:-16777216}
      ASR_MAX_INFERENCE_BATCH_SIZE: ${ASR_MAX_INFERENCE_BATCH_SIZE:-1}
      ASR_MAX_NEW_TOKENS: ${ASR_MAX_NEW_TOKENS:-2048}
      ASR_MAX_CONCURRENT_TRANSCRIPTIONS: ${ASR_MAX_CONCURRENT_TRANSCRIPTIONS:-1}
      ASR_QUEUE_WAIT_SECONDS: ${ASR_QUEUE_WAIT_SECONDS:-5}
    expose:
      - "8010"
    volumes:
      - asr_models_data:/models
    networks:
      - video-commerce-network
    restart: unless-stopped
    shm_size: "4gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  feature-worker:
    <<: *common-service
    command: python -m video_commerce.services.feature_worker.feature_updater
    environment:
      <<: *common-env
      WORKER_TYPE: feature_updater
      MONITORING_WORKER_METRICS_PORT: 9102
    expose:
      - "9102"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  model-trainer:
    <<: *common-service
    command: python -m video_commerce.services.model_trainer.main
    environment:
      <<: *common-env
      RANKING_ENABLE_PERIODIC_TRAINING: "true"
      SERVICE_TRAINER_INTERVAL_SECONDS: ${SERVICE_TRAINER_INTERVAL_SECONDS:-3600}
      MONITORING_WORKER_METRICS_PORT: 9103
    expose:
      - "9103"
    depends_on:
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    command:
      - sh
      - -lc
      - |
        if [ -z "$${REDIS_PASSWORD:-}" ] && [ -n "$${REDIS_PASSWORD_FILE:-}" ]; then
          REDIS_PASSWORD="$$(cat "$${REDIS_PASSWORD_FILE}")"
          export REDIS_PASSWORD
        fi
        auth_args=""
        if [ -n "$${REDIS_PASSWORD:-}" ]; then
          auth_args="--requirepass $${REDIS_PASSWORD}"
        fi
        exec redis-server \
          --appendonly yes \
          --appendfsync everysec \
          --maxmemory 1gb \
          --maxmemory-policy noeviction \
          --save 900 1 \
          --save 300 10 \
          --save 60 10000 \
          $${auth_args}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_PASSWORD_FILE: ${REDIS_PASSWORD_FILE:-}
    volumes:
      - redis_data:/data
    networks:
      - video-commerce-network
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -z "$${REDIS_PASSWORD:-}" ] && [ -n "$${REDIS_PASSWORD_FILE:-}" ]; then REDIS_PASSWORD="$$(cat "$${REDIS_PASSWORD_FILE}")"; fi
          if [ -n "$${REDIS_PASSWORD:-}" ]; then redis-cli -a "$${REDIS_PASSWORD}" ping; else redis-cli ping; fi
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis-cache:
    image: redis:7-alpine
    command:
      - sh
      - -lc
      - |
        if [ -z "$${REDIS_CACHE_PASSWORD:-}" ] && [ -n "$${REDIS_CACHE_PASSWORD_FILE:-}" ]; then
          REDIS_CACHE_PASSWORD="$$(cat "$${REDIS_CACHE_PASSWORD_FILE}")"
          export REDIS_CACHE_PASSWORD
        fi
        auth_args=""
        if [ -n "$${REDIS_CACHE_PASSWORD:-}" ]; then
          auth_args="--requirepass $${REDIS_CACHE_PASSWORD}"
        fi
        exec redis-server \
          --appendonly no \
          --maxmemory ${REDIS_CACHE_MAXMEMORY:-2gb} \
          --maxmemory-policy allkeys-lru \
          --save "" \
          $${auth_args}
    environment:
      REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD:-${REDIS_PASSWORD:-}}
      REDIS_CACHE_PASSWORD_FILE: ${REDIS_CACHE_PASSWORD_FILE:-}
    volumes:
      - redis_cache_data:/data
    networks:
      - video-commerce-network
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -z "$${REDIS_CACHE_PASSWORD:-}" ] && [ -n "$${REDIS_CACHE_PASSWORD_FILE:-}" ]; then REDIS_CACHE_PASSWORD="$$(cat "$${REDIS_CACHE_PASSWORD_FILE}")"; fi
          if [ -n "$${REDIS_CACHE_PASSWORD:-}" ]; then redis-cli -a "$${REDIS_CACHE_PASSWORD}" ping; else redis-cli ping; fi
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-video_commerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video_commerce}
      POSTGRES_DB: ${POSTGRES_DB:-video_commerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
    depends_on:
      zookeeper:
        condition: service_healthy
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - sh
      - -ec
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-interactions --partitions 6 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic video-processing-tasks --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic recommendation-events --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic feature-updates --partitions 3 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic dead-letter-events --partitions 3 --replication-factor 1
    networks:
      - video-commerce-network
    restart: "no"

  flink-volume-init:
    image: flink:1.19.1-scala_2.12-java11
    profiles: ["flink"]
    user: "0:0"
    entrypoint: ["sh", "-lc"]
    command: >
      "mkdir -p /flink/checkpoints /flink/savepoints
      && { test -d /flink/checkpoints/runtime || mkdir -m 0777 /flink/checkpoints/runtime; }
      && { test -d /flink/savepoints/runtime || mkdir -m 0777 /flink/savepoints/runtime; }"
    volumes:
      - flink_checkpoints:/flink/checkpoints
      - flink_savepoints:/flink/savepoints

  flink-jobmanager:
    image: flink:1.19.1-scala_2.12-java11
    profiles: ["flink"]
    command: jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        state.backend: rocksdb
        state.checkpoints.dir: ${FLINK_CHECKPOINT_DIR:-file:///flink/checkpoints/runtime}
        state.savepoints.dir: ${FLINK_SAVEPOINT_DIR:-file:///flink/savepoints/runtime}
        execution.checkpointing.interval: 30s
        execution.checkpointing.timeout: 10min
        execution.checkpointing.externalized-checkpoint-retention: RETAIN_ON_CANCELLATION
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    ports:
      - "127.0.0.1:8081:8081"
    expose:
      - "6123"
      - "8081"
      - "9249"
    volumes:
      - flink_checkpoints:/flink/checkpoints
      - flink_savepoints:/flink/savepoints
    networks:
      - video-commerce-network
    depends_on:
      flink-volume-init:
        condition: service_completed_successfully
    restart: unless-stopped

  flink-taskmanager:
    image: flink:1.19.1-scala_2.12-java11
    profiles: ["flink"]
    command: taskmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: ${FLINK_TASK_SLOTS:-4}
        state.backend: rocksdb
        state.checkpoints.dir: ${FLINK_CHECKPOINT_DIR:-file:///flink/checkpoints/runtime}
        state.savepoints.dir: ${FLINK_SAVEPOINT_DIR:-file:///flink/savepoints/runtime}
        metrics.reporter.prom.factory.class: org.apache.flink.metrics.prometheus.PrometheusReporterFactory
        metrics.reporter.prom.port: 9249
    expose:
      - "6121"
      - "6122"
      - "9249"
    volumes:
      - flink_checkpoints:/flink/checkpoints
      - flink_savepoints:/flink/savepoints
    depends_on:
      flink-volume-init:
        condition: service_completed_successfully
      flink-jobmanager:
        condition: service_started
    networks:
      - video-commerce-network
    restart: unless-stopped

  flink-interaction-features:
    profiles: ["flink"]
    build:
      context: ./flink-jobs/interaction-features
      dockerfile: Dockerfile
    command:
      - sh
      - -lc
      - |
        until flink list -m flink-jobmanager:8081 >/dev/null 2>&1; do sleep 2; done
        flink run -d \
          -m flink-jobmanager:8081 \
          -c com.videocommerce.flink.InteractionFeatureJob \
          /opt/flink/usrlib/interaction-features.jar
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_USER_INTERACTIONS_TOPIC: ${KAFKA_USER_INTERACTIONS_TOPIC:-user-interactions}
      KAFKA_FEATURE_UPDATES_TOPIC: ${KAFKA_FEATURE_UPDATES_TOPIC:-feature-updates}
      KAFKA_DEAD_LETTER_TOPIC: ${KAFKA_DEAD_LETTER_TOPIC:-dead-letter-events}
      FLINK_INTERACTION_FEATURE_CONSUMER_GROUP: ${FLINK_INTERACTION_FEATURE_CONSUMER_GROUP:-video-commerce-flink-feature-v1}
      FLINK_FEATURE_OUTPUT_NAMESPACE: ${FLINK_FEATURE_OUTPUT_NAMESPACE:-official}
      FLINK_CHECKPOINT_DIR: ${FLINK_CHECKPOINT_DIR:-file:///flink/checkpoints/runtime}
      FLINK_WATERMARK_OUT_OF_ORDERNESS_SECONDS: ${FLINK_WATERMARK_OUT_OF_ORDERNESS_SECONDS:-300}
      FLINK_ALLOWED_LATENESS_SECONDS: ${FLINK_ALLOWED_LATENESS_SECONDS:-600}
      FLINK_KAFKA_TRANSACTION_TIMEOUT_MS: ${FLINK_KAFKA_TRANSACTION_TIMEOUT_MS:-600000}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-video_commerce}
      POSTGRES_USER: ${POSTGRES_USER:-video_commerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-video_commerce}
    depends_on:
      flink-jobmanager:
        condition: service_started
      flink-taskmanager:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - flink_checkpoints:/flink/checkpoints
      - flink_savepoints:/flink/savepoints
    networks:
      - video-commerce-network
    restart: "no"

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=200h
      - --web.enable-lifecycle
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - video-commerce-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-video_commerce}:${POSTGRES_PASSWORD:-video_commerce}@postgres:5432/${POSTGRES_DB:-video_commerce}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "9187"
    networks:
      - video-commerce-network
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.62.0
    command:
      - --redis.addr=redis://redis:6379
      - --redis.password=${REDIS_PASSWORD:-}
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - video-commerce-network
    restart: unless-stopped

  redis-cache-exporter:
    image: oliver006/redis_exporter:v1.62.0
    command:
      - --redis.addr=redis://redis-cache:6379
      - --redis.password=${REDIS_CACHE_PASSWORD:-${REDIS_PASSWORD:-}}
    depends_on:
      redis-cache:
        condition: service_healthy
    expose:
      - "9121"
    networks:
      - video-commerce-network
    restart: unless-stopped

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.7.0
    command:
      - --kafka.server=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    expose:
      - "9308"
    networks:
      - video-commerce-network
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    command: ["--config=/etc/otel-collector.yaml"]
    ports:
      - "127.0.0.1:4317:4317"
      - "127.0.0.1:4318:4318"
    volumes:
      - ./monitoring/otel-collector.yaml:/etc/otel-collector.yaml:ro
    depends_on:
      - jaeger
    networks:
      - video-commerce-network
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:1.57
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "127.0.0.1:16686:16686"
    expose:
      - "4317"
      - "4318"
      - "14250"
    networks:
      - video-commerce-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - video-commerce-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-grafana}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-in-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_COOKIE_SECURE: "true"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - video-commerce-network
    depends_on:
      - prometheus
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-06-29T01-20-47Z
    profiles: ["object-storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - video-commerce-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-06-13T22-53-53Z
    profiles: ["object-storage"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - sh
      - -ec
      - |
        mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}"
        mc mb --ignore-existing "local/${OBJECT_STORAGE_BUCKET:-video-commerce-assets}"
    networks:
      - video-commerce-network
    restart: "no"

  backend-tests:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        PYTHON_VERSION: "3.10"
        BUILD_ENV: production
    environment:
      <<: *common-env
      ENVIRONMENT: test
    command: pytest -q tests
    depends_on:
      redis:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    networks:
      - video-commerce-network

  integration-tests:
    profiles: ["test"]
    build:
      context: .
      dockerfile: Dockerfile
      target: test
      args:
        PYTHON_VERSION: "3.10"
        BUILD_ENV: production
    environment:
      <<: *common-env
      ENVIRONMENT: test
      INTEGRATION_BASE_URL: http://gateway-api:8000
    command: pytest -q tests/integration
    depends_on:
      gateway-api:
        condition: service_healthy
    networks:
      - video-commerce-network

volumes:
  caddy_data:
  caddy_config:
  models_data:
  upload_data:
  logs_data:
  redis_data:
  redis_cache_data:
  postgres_data:
  kafka_data:
  flink_checkpoints:
  flink_savepoints:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  minio_data:
  asr_models_data:

networks:
  video-commerce-network:
    driver: bridge
