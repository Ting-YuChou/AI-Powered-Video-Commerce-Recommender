rule_files:
  - ../../monitoring/prometheus-rules.yml

evaluation_interval: 1m

tests:
  - interval: 1m
    input_series:
      - series: 'video_commerce_http_requests_total{job="gateway-api",status="500"}'
        values: '0+10x20'
      - series: 'video_commerce_http_requests_total{job="gateway-api",status="200"}'
        values: '0+100x20'
    alert_rule_test:
      - eval_time: 20m
        alertname: ServiceErrorBudgetBurn
        exp_alerts:
          - exp_labels:
              job: gateway-api
              severity: critical
              slo: availability
            exp_annotations:
              summary: "gateway-api 5xx rate is above the 5% error budget burn threshold"
              description: "gateway-api has exceeded the 5xx error budget for at least 10 minutes."
